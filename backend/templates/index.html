<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>淘宝风商品列表站</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f5f5; color: #333; font-family: Arial, "Microsoft YaHei", sans-serif; }
    header { background: linear-gradient(90deg, #ff5000, #ff8a00); color: #fff; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px 16px; }
    h1 { margin: 0 0 14px; font-size: 28px; }
    .subhead { margin: 0; opacity: .9; }
    main { max-width: 1180px; margin: 0 auto; padding: 22px 16px 40px; }
    .summary { display: flex; justify-content: space-between; margin-bottom: 14px; color: #666; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); transition: .2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .card img { width: 100%; height: 190px; object-fit: cover; display: block; background: #fff2e8; }
    .info { padding: 14px; }
    .title { min-height: 44px; line-height: 1.45; font-weight: 700; }
    .price { margin: 10px 0; color: #ff5000; font-size: 24px; font-weight: 800; }
    .desc { margin: 0; color: #777; line-height: 1.6; font-size: 13px; }
    .pager { display: flex; justify-content: center; align-items: center; gap: 14px; margin-top: 24px; }
    .empty { grid-column: 1 / -1; padding: 44px; text-align: center; color: #888; background: #fff; border-radius: 14px; }
    @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .card img { height: 130px; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>淘宝风商品列表站</h1>
      <p class="subhead">精选好货 · 图片、标题、价格、简介一屏展示</p>
    </div>
  </header>

  <main>
    <div class="summary">
      <span id="total">加载中...</span>
      <span>HTTP 拉取 /api/goods</span>
    </div>
    <section id="goods" class="grid"></section>
  </main>

  <script>
    const els = {
      goods: document.querySelector("#goods"),
      total: document.querySelector("#total"),
    };

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    function render(goods) {
      els.total.textContent = `共 ${goods.length} 件商品`;
      els.goods.innerHTML = goods.length ? goods.map((item) => `
        <article class="card">
          <img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}">
          <div class="info">
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="price">¥${Number(item.price).toFixed(2)}</div>
            <p class="desc">${escapeHtml(item.description)}</p>
          </div>
        </article>
      `).join("") : '<div class="empty">暂无商品</div>';
    }

    async function loadGoods() {
      els.goods.innerHTML = '<div class="empty">正在加载商品...</div>';
      const resp = await fetch("/api/goods");
      const data = await resp.json();
      if (!resp.ok) {
        els.goods.innerHTML = `<div class="empty">${escapeHtml(data.error || "加载失败")}</div>`;
        return;
      }
      render(data.goods || []);
    }
    loadGoods();
  </script>
</body>
</html>
